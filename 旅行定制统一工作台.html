<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行定制统一工作台</title>
<style>
:root{--bg:#f4f1ea;--panel:#fffdf8;--ink:#1f2933;--muted:#6b7280;--line:#d8d0c3;--accent:#b4532a;--soft:#f0e5d6;--ok:#1f7a4d;--warn:#b7791f}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans SC","PingFang SC",Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}
header{background:#171717;color:#fff;padding:14px 22px;border-bottom:3px solid var(--accent);display:flex;justify-content:space-between;gap:12px;align-items:center}
header h1{font-size:18px;font-weight:700} header span{font-size:12px;color:#e7c8b7;letter-spacing:.08em}
.layout{display:grid;grid-template-columns:390px 1fr;min-height:calc(100vh - 57px)}
.input{background:var(--panel);border-right:1px solid var(--line);padding:18px;overflow:auto}
.outputs{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:14px;align-content:start}
.block{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.block.full{grid-column:1/-1}
.title{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:.08em;margin-bottom:10px;text-transform:uppercase;border-bottom:1px solid var(--soft);padding-bottom:7px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.row.one{grid-template-columns:1fr}
label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
input,select,textarea{width:100%;border:1px solid var(--line);background:#faf7f1;border-radius:5px;padding:8px 9px;font-size:14px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:#fff}
textarea{resize:vertical;min-height:58px}
button{border:none;border-radius:5px;padding:9px 12px;cursor:pointer;font-weight:700}
.primary{background:var(--accent);color:#fff;width:100%;font-size:15px;margin-top:8px}.secondary{background:var(--soft);color:var(--ink);border:1px solid var(--line)}
.mini-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}.mini-actions button{font-size:12px;padding:7px 10px}
.cost-item{display:grid;grid-template-columns:1.1fr .8fr .7fr 34px;gap:6px;margin-bottom:6px;align-items:center}
.cost-item.ticket{grid-template-columns:1.1fr .65fr .55fr .55fr 34px}
.cost-item button{padding:7px;background:#f4d8cc;color:#8a341b}
.add-line{display:grid;grid-template-columns:1.1fr .8fr .7fr 64px;gap:6px;margin-top:7px}
.add-line.ticket{grid-template-columns:1.2fr .65fr .55fr .55fr 64px}
.hint{font-size:12px;color:var(--muted);background:#fff8ec;border:1px solid #ead7bb;border-radius:6px;padding:8px;margin:8px 0}
.day{border:1px solid var(--line);border-radius:7px;margin-bottom:9px;overflow:hidden;background:#fff}
.day h3{background:#f7efe4;color:var(--accent);font-size:15px;padding:8px 10px;display:flex;justify-content:space-between;gap:8px}
.day .body{padding:9px 11px;font-size:14px}.day p{margin-bottom:5px}.badge{font-size:11px;border-radius:99px;padding:2px 8px;background:#e8f5ee;color:var(--ok);white-space:nowrap}.badge.warn{background:#fff4d8;color:var(--warn)}
.quote-total{background:#171717;color:#fff;border-radius:7px;padding:12px;margin-top:10px}.quote-total b{font-size:24px}
table{width:100%;border-collapse:collapse;font-size:14px}td,th{border-bottom:1px dashed var(--line);padding:7px;text-align:left}td.num{text-align:right;font-variant-numeric:tabular-nums}
.copybox{white-space:pre-wrap;background:#faf7f1;border:1px solid var(--line);border-radius:6px;padding:10px;font-size:14px;min-height:80px}
@media(max-width:980px){.layout{grid-template-columns:1fr}.input{border-right:none;border-bottom:1px solid var(--line)}.outputs{grid-template-columns:1fr}}
@media print{header,.input,.mini-actions{display:none}.layout{display:block}.outputs{display:block;padding:0}.block{break-inside:avoid;margin-bottom:12px;box-shadow:none}}
</style>
</head>
<body>
<header>
  <h1>旅行定制统一工作台</h1>
  <span>一次输入 · 行程 + 报价 + 成交文案</span>
</header>
<div class="layout">
  <section class="input">
    <div class="title">① 客户输入区</div>
    <div class="row">
      <div><label>目的地</label><input id="destination" value="意大利" placeholder="如：法国 / 意大利 / 日本"></div>
      <div><label>天数</label><input id="days" type="number" min="1" value="7"></div>
    </div>
    <div class="row">
      <div><label>出发日期</label><input id="startDate" type="date"></div>
      <div><label>人数</label><input id="people" type="number" min="1" value="2"></div>
    </div>
    <div class="row">
      <div><label>客户类型</label><select id="customer" onchange="adjustByClientType(this.value)"><option selected>高端</option><option>亲子</option><option>情侣</option><option>性价比</option></select></div>
      <div><label>预算</label><input id="budget" placeholder="如：8万以内"></div>
    </div>
    <div class="row one"><label>行程线路输入（例：罗马 → 佛罗伦萨 → 威尼斯）</label><textarea id="routeLine" placeholder="罗马 → 佛罗伦萨 → 威尼斯">罗马 → 佛罗伦萨 → 威尼斯</textarea></div>
    <div class="mini-actions"><button class="secondary" onclick="autoGenerateFromRoute($('routeLine').value)">根据线路自动生成报价</button><button class="secondary" onclick="generateAll()">刷新全部输出</button></div>
    <div class="row one"><label>城市 / 路线顺序（用 /、逗号或换行分隔）</label><textarea id="cities">罗马 / 佛罗伦萨 / 威尼斯</textarea></div>
    <div class="row one"><label>必打卡景点（每行一个，可写“城市-景点”）</label><textarea id="mustSee">罗马-斗兽场
罗马-万神殿
佛罗伦萨-乌菲兹美术馆
威尼斯-圣马可广场
威尼斯-贡多拉</textarea></div>
    <div class="row">
      <div><label>节奏偏好</label><select id="pace"><option>自动判断</option><option>轻松</option><option selected>标准</option><option>紧凑</option></select></div>
      <div><label>用车季节</label><select id="season"><option value="off">淡季</option><option value="peak">旺季</option></select></div>
    </div>
    <div class="hint">报价保持原逻辑：人民币 = 欧元 × 1.35 × 8.3。</div>

    <div class="title">报价费用输入</div>
    <label>包车费用</label><div id="carList"></div>
    <div class="add-line"><input id="carName" placeholder="城市/说明"><input id="carEur" type="number" placeholder="€/天"><input id="carDays" type="number" value="1" min="1"><button class="secondary" onclick="addCost('car')">添加</button></div>
    <label style="margin-top:10px">接送机</label><div id="transferList"></div>
    <div class="add-line"><input id="transferName" placeholder="城市/接送机"><input id="transferEur" type="number" placeholder="€/次"><input id="transferQty" type="number" value="1" min="1"><button class="secondary" onclick="addCost('transfer')">添加</button></div>
    <label style="margin-top:10px">门票</label><div id="ticketList"></div>
    <div class="add-line"><select id="ticketSelect"><option value="">从门票价格库选择</option></select><button class="secondary" onclick="addTicketFromDB()">选入门票</button></div>
    <div class="add-line ticket"><input id="ticketName" placeholder="景点"><select id="ticketUnit"><option value="person">€/人</option><option value="total">€/总价</option></select><input id="ticketEur" type="number" placeholder="€"><select id="ticketCat"><option>必打卡</option><option>可选</option><option>不含</option></select><button class="secondary" onclick="addCost('ticket')">添加</button></div>
    <div class="row" style="margin-top:10px">
      <div><label>定制师服务费（固定 ¥100/人/天，不加价）</label><input id="serviceRate" type="number" value="100" readonly></div>
      <div><label>当前加价系数</label><input id="markup" type="number" value="1.35" step="0.01" readonly></div>
    </div>
    <label style="margin-top:10px">空返/调度费</label><div id="deadheadList"></div>
    <div class="add-line"><input id="deadheadName" placeholder="如：威尼斯 → 返回"><input id="deadheadEur" type="number" placeholder="€/段"><input id="deadheadQty" type="number" value="1" min="1"><button class="secondary" onclick="addCost('deadhead')">添加</button></div>
    <label style="margin-top:10px">司机住宿补贴</label><div id="lodgingList"></div>
    <div class="add-line"><input id="lodgingName" placeholder="如：跨城司机住宿补贴"><input id="lodgingEur" type="number" placeholder="€/晚"><input id="lodgingQty" type="number" value="1" min="1"><button class="secondary" onclick="addCost('lodging')">添加</button></div>
    <label style="margin-top:10px">酒店（人民币成本 × 1.15）</label><div id="hotelList"></div>
    <div class="add-line"><input id="hotelName" placeholder="如：全程酒店"><input id="hotelCny" type="number" placeholder="¥成本/项"><input id="hotelQty" type="number" value="1" min="1"><button class="secondary" onclick="addCost('hotel')">添加</button></div>
    <label style="margin-top:10px">机票（人民币成本 × 1.15）</label><div id="flightList"></div>
    <div class="add-line"><input id="flightName" placeholder="如：国际机票/内陆段"><input id="flightCny" type="number" placeholder="¥成本/项"><input id="flightQty" type="number" value="1" min="1"><button class="secondary" onclick="addCost('flight')">添加</button></div>
    <div class="row" style="margin-top:10px"><div><label>报价备注</label><input id="quoteNote" placeholder="含税，不含小费等"></div></div>
    <button class="primary" onclick="generateAll()">一键生成全部内容</button>
    <div class="mini-actions"><button class="secondary" onclick="copyAll()">复制全部</button><button class="secondary" onclick="exportWord()">导出 Word</button><button class="secondary" onclick="window.print()">导出 PDF</button><button class="secondary" onclick="clearAll()">清空</button></div>
  </section>

  <main class="outputs">
    <section class="block full"><div class="title">② 行程输出区</div><div id="itineraryOut" class="hint">填写左侧信息后，点击一键生成。</div></section>
    <section class="block"><div class="title">③ 报价输出区</div><div id="quoteOut" class="hint">报价会使用原公式自动计算。</div></section>
    <section class="block"><div class="title">④ 文案输出区</div><div id="copyOut" class="hint">卖点、客户话术、小红书标题会同步生成。</div></section>
  </main>
</div>

<script>

function updateTicketSelect(){
  const sel = $('ticketSelect');
  if(!sel) return;
  const keys = [ $('destination').value, ...split($('cities').value), ...parseRouteText($('routeLine').value) ].filter(Boolean);
  let list = TICKET_DB.filter(t => keys.some(k => (t.co||'').includes(k) || (t.ci||'').includes(k) || k.includes(t.ci) || (t.n||'').includes(k)));
  if(!list.length) list = TICKET_DB.slice(0, 160);
  const seen = new Set();
  sel.innerHTML = '<option value="">从门票价格库选择</option>';
  list.forEach(t => {
    const key = t.co + t.ci + t.n;
    if(seen.has(key)) return;
    seen.add(key);
    const opt = document.createElement('option');
    opt.value = JSON.stringify(t);
    opt.textContent = `${t.co}｜${t.ci}｜${t.n} ${t.d || ('€'+t.p)}`;
    sel.appendChild(opt);
  });
}
function addTicketFromDB(){
  const sel = $('ticketSelect');
  if(!sel || !sel.value) return;
  const t = JSON.parse(sel.value);
  state.ticket.push({name:t.n, eur:parseFloat(t.p)||0, unit:'person', cat:'必打卡'});
  if(!$('mustSee').value.includes(t.n)){
    const city = t.ci ? t.ci + '-' : '';
    $('mustSee').value = ($('mustSee').value.trim() + '\n' + city + t.n).trim();
  }
  sel.value = '';
  renderCostInputs();
  generateAll();
}

function parseRouteText(text){
  return String(text||'').split(/\s*(?:→|->|—|–|-|\/|、|,|，|\n)\s*/).map(c=>c.trim()).filter(Boolean);
}
function carRowScore(row, city){
  const text = `${row.name || ''} ${row.note || ''}`;
  let score = 0;
  if(text.includes(city)) score += 20;
  if(city.includes('阿玛菲') || city.includes('那不勒斯') || city.includes('波西塔诺') || city.includes('索伦托')) {
    if(row.name.includes('南意')) score += 40;
  }
  if(city.includes('西西里') && row.name.includes('西西里')) score += 50;
  if(['罗马','米兰','佛罗伦萨','威尼斯'].some(k => city.includes(k)) && row.name.includes('意大利常规城市')) score += 15;
  if(['慕尼黑','柏林','法兰','科隆','杜塞'].some(k => city.includes(k)) && row.name.includes('德国常规城市')) score += 15;
  if(['苏黎世','日内瓦','卢塞恩','因特拉肯','采尔马特'].some(k => city.includes(k)) && row.name.includes('瑞士')) score += 15;
  if(row.name && (row.name.includes(city) || city.includes(row.name.replace(/[（）()]/g,'')))) score += 25;
  if(/ncc/i.test(row.name) && !/ncc/i.test(city)) score -= 30;
  if(/ncc/i.test(row.name) && /ncc/i.test(city)) score += 40;
  return score;
}
function autoMatchCarRow(city){
  let best = null, bestScore = -1;
  CAR_PRICE_DB.forEach(row => {
    const score = carRowScore(row, city);
    if(score > bestScore){ best = row; bestScore = score; }
  });
  return bestScore > 0 ? best : null;
}
function autoMatchPrice(city){
  const row = autoMatchCarRow(city);
  if(row){
    const season = $('season')?.value === 'peak' ? 'Peak' : 'Off';
    return row['benz' + season] || row.benzOff || row.benzPeak || 450;
  }
  const key = Object.keys(CITY_PRICE).find(k => city.includes(k) || k.includes(city));
  return key ? CITY_PRICE[key] : 450;
}

    const row = autoMatchCarRow(city);
    const note = row?.name ? `（匹配：${row.name}）` : '';
    state.car.push({name: city + '｜奔驰商务' + note, eur: autoMatchPrice(city), days: useDays});

function conv(eur){return Math.ceil((eur||0) * markupRate() * 8.3);}
function convRmb(cost){return Math.ceil((cost||0) * RMB_MARKUP);}
function quoteCalc(){
  const pax = n('people') || 1, days = n('days') || 1;
  const car = state.car.reduce((s,x)=>s+conv(x.eur*x.days),0);
  const transfer = state.transfer.reduce((s,x)=>s+conv(x.eur*x.qty),0);
  const ticket = state.ticket.reduce((s,x)=>s+(x.cat==='不含'?0:conv(x.eur*(x.unit==='person'?pax:1))),0);
  const deadhead = (state.deadhead||[]).reduce((s,x)=>s+conv(x.eur*x.qty),0);
  const lodging = (state.lodging||[]).reduce((s,x)=>s+conv(x.eur*x.qty),0);
  const hotel = (state.hotel||[]).reduce((s,x)=>s+convRmb(x.cny*x.qty),0);
  const flight = (state.flight||[]).reduce((s,x)=>s+convRmb(x.cny*x.qty),0);
  const service = Math.ceil((n('serviceRate')||0)*pax*days);
  return {car,transfer,ticket,deadhead,lodging,hotel,flight,service,total:car+transfer+ticket+deadhead+lodging+hotel+flight+service};
}

function parseMust(){
  return split($('mustSee').value).map(raw=>{
    const parts = raw.split(/\s*[-—:：]\s*/);
    return {city:parts.length>1?parts[0].trim():'', name:(parts[1]||parts[0]).trim(), raw};
  });
}
function groupMustSeeByRoute(items,cities,dest){
  const db = dbFor(dest), used = new Set(), groups = [];
  cities.forEach(city=>{
    const arr = items.filter(x => !used.has(x.name) && (x.city===city || x.raw.includes(city)));
    if(arr.length){arr.forEach(x=>used.add(x.name)); groups.push({city,label:city+'核心景点',items:arr,note:'同城景点集中安排，减少绕路'});}
  });
  const farWords = ['凡尔赛','圣米歇尔','摩纳哥','埃兹','五渔村','比萨','庞贝','阿玛菲','卡普里','少女峰','马特洪峰','箱根','奈良'];
  const far = items.filter(x => !used.has(x.name) && farWords.some(w=>x.name.includes(w)||x.raw.includes(w)));
  if(far.length){far.forEach(x=>used.add(x.name)); groups.push({city:far[0].city||cities[0],label:'远郊/跨城单日',items:far,note:'远郊景点建议单独安排，避免和市区硬拼',long:true});}
  const rest = items.filter(x=>!used.has(x.name));
  for(let i=0;i<rest.length;i+=2) groups.push({city:rest[i].city||cities[i%cities.length]||dest,label:'必打卡景点',items:rest.slice(i,i+2),note:'未识别景点按每组2个分散安排'});
  if(!groups.length){
    (db.must||[]).slice(0,Math.min(6,Math.max(3,parseInt($('days').value)||3))).forEach((name,i)=>groups.push({city:cities[i%cities.length]||dest,label:'推荐景点',items:[{name}],note:'根据目的地常规亮点补充'}));
  }
  return groups;
}
function autoPace(days, mustCount, pref){
  if(pref && pref!=='自动判断') return pref;
  const per = mustCount / Math.max(days,1);
  if(per <= 1.8) return '轻松';
  if(per >= 3.4) return '紧凑';
  return '标准';
}
function distribute(groups,days,pace){
  const plan = Array.from({length:days},()=>[]);
  const target = days<=2 ? [...Array(days).keys()] : [...Array(days-2).keys()].map(i=>i+1);
  let pos=0, cap = pace==='轻松'?3:pace==='紧凑'?5:4;
  groups.forEach(g=>{
    let best = target[pos % target.length] ?? 0;
    if(g.long){
      const empty = target.find(i=>plan[i].length===0);
      if(empty!==undefined) best=empty;
    }else{
      for(let j=0;j<target.length;j++){
        const cand = target[(pos+j)%target.length];
        const count = plan[cand].reduce((s,x)=>s+x.items.length,0);
        if(count + g.items.length <= cap){best=cand;break;}
      }
    }
    plan[best].push(g); pos++;
  });
  return plan;
}
function generateItinerary(){
  const dest=$('destination').value.trim()||'目的地', db=dbFor(dest);
  const days=Math.max(1,parseInt($('days').value)||1);
  const cities=split($('cities').value).length?split($('cities').value):db.cities.slice(0,Math.min(3,days));
  const must=parseMust();
  const pace=autoPace(days,must.length,$('pace').value);
  const groups=groupMustSeeByRoute(must,cities,dest);
  const arranged=distribute(groups,days,pace);
  const perCity=Math.ceil(days/Math.max(cities.length,1));
  const dayCity=i=>cities[Math.min(Math.floor(i/perCity),cities.length-1)]||dest;
  const start=$('startDate').value ? new Date($('startDate').value) : null;
  const cards=[];
  for(let i=0;i<days;i++){
    const city=dayCity(i), gs=arranged[i]||[], isFirst=i===0, isLast=i===days-1;
    const date=start?new Date(start.getTime()+i*86400000).toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'}):'';
    let morning, afternoon, evening, note;
    if(isFirst){morning='抵达'+city+'，专车接机/接站，入住后休整'; afternoon='轻量城市初印象，不安排重体力项目'; evening='安排欢迎晚餐或自由散步'; note='首日重点是恢复体力，不堆景点';}
    else if(isLast){morning='酒店早餐后自由活动，补充购物或拍照'; afternoon='根据航班/车次安排送机/送站'; evening='返程'; note='返程日不塞重景点，降低误机风险';}
    else if(gs.length){
      const names=gs.flatMap(g=>g.items.map(x=>x.name));
      morning='优先游览 '+names.slice(0,2).join('、');
      afternoon=names.length>2?'继续顺路安排 '+names.slice(2).join('、'):'下午安排周边街区、美食或咖啡休息';
      evening='晚餐后自由活动，保留弹性调整';
      note=gs.map(g=>g.note).join('；') || '必打卡已分散安排';
    }else{
      const rec=(db.must||['城市精华','特色街区','观景点']);
      morning='游览 '+(rec[i%rec.length]||city+'核心区');
      afternoon='顺路安排老城/商圈/本地体验，避免来回折返';
      evening='自由晚餐，可按客户兴趣安排夜景或特色餐厅';
      note='作为弹性日，用来平衡整体节奏';
    }
    const count=(morning+afternoon).split(/[、,，]/).length;
    const warn=count>(pace==='轻松'?4:pace==='标准'?5:6);
    cards.push({day:i+1,date,city,morning,afternoon,evening,note,pace,warn});
  }
  const route=cities.join(' → ');
  return {dest,days,cities,route,pace,cards,db};
}

  const blob = new Blob(['\ufeff', html], {type:'application/msword;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = title + '.doc';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
function save(){
  const ids=['destination','days','startDate','people','customer','budget','routeLine','cities','mustSee','pace','season','serviceRate','markup','quoteNote'];
  const form={}; ids.forEach(id=>{ if($(id)) form[id]=$(id).value; });
  localStorage.setItem('travelUnifiedWorkbench',JSON.stringify({form,state}));
}
function restore(){
  try{const raw=localStorage.getItem('travelUnifiedWorkbench'); if(!raw)return; const data=JSON.parse(raw); Object.entries(data.form||{}).forEach(([id,v])=>{if($(id))$(id).value=v}); state=Object.assign({car:[],transfer:[],ticket:[],deadhead:[],lodging:[],hotel:[],flight:[],autoRoute:''}, data.state||{});}catch(e){}
}
function clearAll(){if(!confirm('确认清空当前工作台？'))return;localStorage.removeItem('travelUnifiedWorkbench');location.reload();}
document.querySelectorAll('input,textarea,select').forEach(el=>{
  const handler=()=>{ if(el.id==='season') state.autoRoute=''; save(); if(['destination','cities','routeLine'].includes(el.id)) updateTicketSelect(); };
  el.addEventListener('input',handler); el.addEventListener('change',handler);
});
restore(); renderCostInputs(); updateTicketSelect(); generateAll();
</script>
